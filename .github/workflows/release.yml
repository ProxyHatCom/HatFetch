name: Publish to npm

# Publishes `hatfetch` to npm when you publish a GitHub Release (or push a v* tag).
# Requires a repo secret NPM_TOKEN (npmjs.com -> Access Tokens -> Generate -> "Automation").
on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
